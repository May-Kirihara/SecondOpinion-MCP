# SecondOpinion-MCP — example configuration
#
# Place this file at one of:
#   - $SECONDOPINION_MCP_CONFIG                       (highest priority)
#   - ./secondopinion.toml                            (current working dir)
#   - ~/.config/secondopinion-mcp/config.toml         (XDG)
#
# Provider IDs and model IDs must match what your opencode installation
# already knows about. Check with:  opencode models

# Path to the opencode binary. Leave as "opencode" if it's on PATH.
opencode_binary = "opencode"

# Default opencode agent ("build", "plan", or any custom agent you've defined).
default_agent = "build"

# Default provider key — must match one of the [providers.*] table names below.
default_provider = "glm"

# Optional: working directory passed to `opencode serve`. Defaults to the
# directory the MCP server itself was launched from.
# working_dir = "/path/to/some/project"

# Optional: extra args appended to the `opencode serve` invocation.
# extra_serve_args = ["--log-level", "INFO"]

[server]
port = 0                  # 0 = pick a random free port
hostname = "127.0.0.1"
startup_timeout_s = 30
request_timeout_s = 600   # generous — second opinions can take a while

# SSE-liveness watchdog. While a request is in flight the client subscribes to
# opencode's `/event` stream; if no event scoped to that session arrives for
# this many seconds, the request is failed fast as a transport stall instead of
# blocking the full `request_timeout_s` in silence. `request_timeout_s` stays as
# the backstop for slow-but-alive turns (they keep emitting events). Healthy
# turns show a first event in ~1s and gaps under ~5s, so 30 leaves a wide
# margin. Set to 0 to disable the watchdog (legacy behaviour).
stall_idle_timeout_s = 30

# Cold-start grace for the watchdog. Until the FIRST session-scoped event
# arrives this (larger) threshold is used instead of `stall_idle_timeout_s`,
# so a backend that is still spawning or loading a model doesn't get killed
# as a false stall. After the first event the normal idle threshold applies.
stall_first_event_grace_s = 120

# How long finished job results (success or error) are retained so the caller
# can re-poll an already-collected `job_id` and get the same result
# re-delivered (e.g. after the caller's own tool call timed out mid-poll).
job_result_ttl_s = 600

# Hybrid async wait window. `second_opinion` / `delegate_task` / `poll_task`
# block at most this many seconds for a reply; if the external model is still
# thinking they return `status:"running"` with a `job_id` the caller polls via
# `poll_task` (the model keeps running server-side). Keep this well under the
# calling MCP host's per-tool timeout (often ~60s) so the call returns before
# the host kills it. Recommended: 15-25s. Override per-call with the tools'
# `max_wait_s` argument.
wait_window_s = 20

# ----- Providers ------------------------------------------------------------
# Each [providers.<key>] table maps a friendly name to an opencode
# provider/model pair.

[providers.glm]
provider_id = "zai-coding-plan"
model_id = "glm-5.1"
description = "Z.AI GLM-5.1 (coding plan)"

# Example: a locally hosted llama.cpp model registered in your opencode.json
# [providers.qwen-local]
# provider_id = "llama.cpp"
# model_id = "qwen3.5-REAP-262B"
# description = "Local Qwen 3.5 REAP 262B via llama.cpp"

# Example: a reasoning-effort variant
# [providers.glm-high]
# provider_id = "zai-coding-plan"
# model_id = "glm-5.1"
# variant = "high"
# description = "GLM-5.1 with high reasoning effort"

# ----- Per-tool overrides (optional) ----------------------------------------

[tools.second_opinion]
# agent = "plan"   # use a read-only agent for second opinions if you've defined one
# system_prompt = """
# You are a senior reviewer. Be blunt about flaws, name concrete improvements,
# and skip pleasantries.
# """

[tools.delegate_task]
# agent = "build"
# system_prompt = """
# You are a subagent. Complete the task carefully and report back with results.
# """
